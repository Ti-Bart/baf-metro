<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Bafômetro Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --danger: #ef4444;
            --success: #22c55e;
            --bg-gradient-start: #f8fafc;
            --bg-gradient-end: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-color: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-color);
            text-align: center;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .logo {
            width: 220px;
            margin-bottom: 24px;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
        }

        h1 {
            font-weight: 800;
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: var(--text-color);
        }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 48px;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 9999px;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.4);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            background: var(--primary-hover);
            box-shadow: 0 20px 25px -5px rgba(14, 165, 233, 0.5);
        }

        .btn-action:active {
            transform: translateY(1px);
        }

        .btn-action:disabled {
            background: #64748b;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.7;
        }

        #resultado {
            margin-top: 30px;
            font-size: 1.5rem;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            transition: all 0.3s ease;
        }

        .resultado-box {
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            animation: fadeIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .alerta {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--danger);
            color: #b91c1c;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.2);
        }

        .alerta .numero {
            font-size: 2.5rem;
            display: block;
            color: var(--danger);
            margin-bottom: 8px;
        }

        .liberado {
            background: rgba(34, 197, 94, 0.1);
            border: 2px solid var(--success);
            color: #15803d;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.2);
        }

        .liberado .numero {
            font-size: 2.5rem;
            display: block;
            color: var(--success);
            margin-bottom: 8px;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img class="logo" src="https://jbsterminais.com.br/wp-content/uploads/2024/09/JBSTERMINAIS-LOGO.PNG" alt="JBS Terminais">
        
        <h1>Teste Bafômetro</h1>
        
        <button id="btnAleatorizar" class="btn-action">SORTEAR AGORA</button>
        
        <div id="loading" class="spinner"></div>
        <div id="resultado"></div>
    </div>

    <!-- Áudio de alarme -->
    <audio id="alarme" preload="auto">
        <source src="https://www.myinstants.com/media/sounds/alert.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
